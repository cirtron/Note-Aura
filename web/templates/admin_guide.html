<div class="flex items-center gap-3 mb-4">
  <h1 class="text-xl font-bold">{{t .Lang "guide.edit"}}</h1>
  <a href="/admin" class="text-sm text-indigo-600">← Admin</a>
  <a href="/guide" class="text-sm text-indigo-600">{{t .Lang "guide.view"}}</a>
</div>

{{if .Saved}}<p class="text-green-700 bg-green-50 border border-green-200 rounded px-3 py-2 text-sm mb-3">{{t .Lang "guide.saved"}}</p>{{end}}

<div class="bg-white rounded-xl p-4 shadow-sm">
  <p class="text-sm text-neutral-500 mb-3">{{t .Lang "guide.edit.help"}}</p>
  <form method="post" action="/admin/guide">
    <textarea name="guide_content" rows="40"
              class="w-full border rounded px-3 py-2 text-sm font-mono text-neutral-700">{{.GuideContent}}</textarea>
    <div class="mt-3 flex items-center gap-3">
      <button class="bg-indigo-600 text-white rounded px-4 py-2">{{t .Lang "action.save"}}</button>
      <a href="/guide" class="text-sm text-neutral-500">{{t .Lang "guide.view"}}</a>
    </div>
  </form>
</div>
