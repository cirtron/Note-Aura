<div class="flex items-center gap-3 mb-4">
  <h1 class="text-xl font-bold">{{t .Lang "admin.ip_block.title"}}</h1>
  <a href="/admin" class="text-sm text-indigo-600">← Admin</a>
</div>

<section class="bg-white rounded-xl p-4 shadow-sm mb-6">
  <p class="text-sm text-neutral-500 mb-3">{{t .Lang "admin.ip_block.help"}}</p>
  <form method="post" action="/admin/ip-block/add" class="flex flex-wrap gap-2 items-end">
    <input name="ip" placeholder="{{t .Lang "admin.ip_block.ip_ph"}}" required class="border rounded px-3 py-1.5 text-sm w-44">
    <input name="reason" placeholder="{{t .Lang "admin.ip_block.reason_ph"}}" class="border rounded px-3 py-1.5 text-sm flex-1">
    <button class="bg-red-600 text-white rounded px-3 py-1.5 text-sm">{{t .Lang "admin.ip_block.add"}}</button>
  </form>
</section>

<section class="bg-white rounded-xl p-4 shadow-sm mb-6">
  {{if .BlockedIPs}}
  <table class="text-sm w-full">
    <thead><tr class="text-left text-neutral-400">
      <th class="py-1 pr-3 font-medium">IP</th>
      <th class="pr-3 font-medium">Reason</th>
      <th class="pr-3 font-medium">Blocked at</th>
      <th></th>
    </tr></thead>
    <tbody>
    {{range .BlockedIPs}}
    <tr class="border-t">
      <td class="py-1 pr-3 font-mono">{{.IP}}</td>
      <td class="pr-3 text-neutral-500">{{.Reason}}</td>
      <td class="pr-3 text-neutral-400 whitespace-nowrap">{{date .BlockedAt}}</td>
      <td>
        <form method="post" action="/admin/ip-block/remove" onsubmit="return confirm('{{t $.Lang "admin.ip_block.removeconfirm"}}')">
          <input type="hidden" name="id" value="{{.ID}}">
          <button class="text-xs text-red-600">{{t $.Lang "admin.ip_block.unblock"}}</button>
        </form>
      </td>
    </tr>
    {{end}}
    </tbody>
  </table>
  {{else}}<p class="text-sm text-neutral-400">{{t .Lang "admin.ip_block.empty"}}</p>{{end}}
</section>
