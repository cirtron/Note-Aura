<div class="max-w-sm mx-auto mt-16 bg-white p-6 rounded-xl shadow">
  {{with brand}}{{if .LogoPath}}<img src="{{.LogoPath}}" alt="logo" class="h-10 max-w-[220px] object-contain mb-2">{{else if .Text}}<h1 class="text-xl font-bold mb-1">{{.Text}}</h1>{{else}}<h1 class="text-xl font-bold mb-1">Note-Aura</h1>{{end}}{{end}}
  <h2 class="font-semibold mb-1">{{t .Lang "reset.title"}}</h2>
  <p class="text-sm text-neutral-500 mb-4">{{t .Lang "reset.subtitle"}}</p>
  {{if .Error}}<p class="text-red-600 text-sm mb-3">{{.Error}}</p>{{end}}
  <form method="post" action="/reset" class="space-y-3">
    <input type="hidden" name="token" value="{{.Token}}">
    <input name="password" type="password" placeholder="{{t .Lang "reset.newpassword"}}" required autofocus minlength="6"
           class="w-full border rounded px-3 py-2">
    <button class="w-full bg-indigo-600 text-white rounded py-2">{{t .Lang "reset.submit"}}</button>
  </form>
</div>
