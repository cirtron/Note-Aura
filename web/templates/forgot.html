<div class="max-w-sm mx-auto mt-16 bg-white p-6 rounded-xl shadow">
  {{with brand}}{{if .LogoPath}}<img src="{{.LogoPath}}" alt="logo" class="h-10 max-w-[220px] object-contain mb-2">{{else if .Text}}<h1 class="text-xl font-bold mb-1">{{.Text}}</h1>{{else}}<h1 class="text-xl font-bold mb-1">Note-Aura</h1>{{end}}{{end}}
  <h2 class="font-semibold mb-1">{{t .Lang "forgot.title"}}</h2>
  <p class="text-sm text-neutral-500 mb-4">{{t .Lang "forgot.subtitle"}}</p>
  {{if .Notice}}<p class="text-green-600 text-sm mb-3">{{.Notice}}</p>{{end}}
  {{if .Error}}<p class="text-red-600 text-sm mb-3">{{.Error}}</p>{{end}}
  <form method="post" action="/forgot" class="space-y-3">
    <input name="email" type="email" placeholder="{{t .Lang "auth.email"}}" required autofocus
           class="w-full border rounded px-3 py-2">
    {{if .CaptchaImage}}
    <div>
      <label class="block text-sm text-neutral-600 mb-1">{{t .Lang "auth.captcha"}}</label>
      <img src="{{.CaptchaImage}}" alt="{{t .Lang "auth.captcha"}}" width="170" height="60"
           class="rounded border bg-white mb-1">
      <input name="captcha" type="text" autocomplete="off" autocapitalize="characters"
             autocorrect="off" spellcheck="false" required placeholder="{{t .Lang "auth.captcha_hint"}}"
             class="w-full border rounded px-3 py-2 uppercase tracking-widest">
    </div>
    {{end}}
    <button class="w-full bg-indigo-600 text-white rounded py-2">{{t .Lang "forgot.submit"}}</button>
  </form>
  <p class="text-sm text-neutral-500 mt-4"><a href="/login" class="text-indigo-600">{{t .Lang "forgot.backtosignin"}}</a></p>
</div>
